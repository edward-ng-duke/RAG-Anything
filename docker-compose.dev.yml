services:
  pg:
    build:
      context: apps/server/docker
      dockerfile: poc-pg.Dockerfile
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      # Host port shifted to 5532 so this stack can run alongside onyx's dev
      # postgres (which publishes 5432). Container-internal port stays 5432.
      - "5532:5432"
    networks: [rag-dev-net]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - redis-data:/data
    ports:
      # Host port shifted to 6479 so this stack can run alongside onyx's dev
      # redis (which publishes 6379). Container-internal port stays 6379.
      - "6479:6379"
    networks: [rag-dev-net]

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: ["rag-api"]
    environment: &rag-env
      DATABASE_URL: postgresql+asyncpg://rag:rag@pg:5432/rag
      REDIS_URL: redis://redis:6379/0
      # INTERNAL_TOKEN must be ≥64 chars (Settings validator); default is
      # padded to 64 so a fresh `docker compose up` works without an
      # explicit value while still satisfying the length check.
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-secret-dev-secret-dev-secret-dev-secret-dev-secret-dev-secret-pad}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      VLM_MODEL: ${VLM_MODEL:-}
      MINERU_CLOUD_API_KEY: ${MINERU_CLOUD_API_KEY:-}
      # Reference script + many .env files use MINERU_CLOUD_TOKEN; settings
      # accept either via AliasChoices, so forward both into the container.
      MINERU_CLOUD_TOKEN: ${MINERU_CLOUD_TOKEN:-}
      MINERU_CLOUD_BASE_URL: ${MINERU_CLOUD_BASE_URL:-}
      PARSER_MODE: ${PARSER_MODE:-mineru_cloud}
      DATA_DIR: /data
      MAX_UPLOAD_MB: 1000
      LRU_INSTANCE_CAP: 32
      # ONYX integration knobs — empty defaults disable the optional gates.
      INTERNAL_TOKENS_LEGACY: ${INTERNAL_TOKENS_LEGACY:-}
      ONYX_BACKEND_ALLOWED_CIDRS: ${ONYX_BACKEND_ALLOWED_CIDRS:-}
      ONYX_RATELIMIT_OVERRIDES_JSON: ${ONYX_RATELIMIT_OVERRIDES_JSON:-}
    ports:
      - "8800:8000"
    volumes:
      - rag-data:/data
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [rag-dev-net]

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: ["rag-worker"]
    environment: *rag-env
    volumes:
      - rag-data:/data
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [rag-dev-net]

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8800}
    ports:
      - "3300:3000"
    depends_on:
      - api
    networks: [rag-dev-net]

volumes:
  pg-data:
  redis-data:
  rag-data:

networks:
  rag-dev-net:
    driver: bridge
