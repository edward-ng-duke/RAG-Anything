# Alembic configuration for the rag_service control plane.
#
# The sqlalchemy.url field is intentionally empty: env.py loads the connection
# string from the DATABASE_URL environment variable so we keep secrets out of
# version control and so the same migration scripts work in dev/staging/prod.

[alembic]
# path to migration scripts (relative to this ini file)
script_location = alembic

# explicit version_locations so it's obvious where new revisions land
version_locations = alembic/versions

# prepend src/ to sys.path so env.py can `import rag_service.db.base`
prepend_sys_path = src

# Use os.pathsep for splitting list-valued options
path_separator = os

# Connection string is resolved at runtime by env.py from $DATABASE_URL.
sqlalchemy.url =


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples


# Logging configuration.  This is also consumed by the user-maintained
# env.py script only.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
